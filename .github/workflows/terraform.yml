name: Terraform Deploy
on:
  push:
    branches:
      - master
jobs:
  pylint:
    name: Pylint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install pylint
        run: pip install pylint
      - name: Run Pylint on python folder
        run: pylint python/ --disable=E0401,R0801
      # - name: Run Pylint on spark folder
      #   run: pylint spark/ --disable=E0401,R0801

  upload-spark:
    name: Upload Spark Files
    runs-on: ubuntu-latest
    needs: pylint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Upload Spark files to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: spark
          destination: nyc-taxi-trips-spark-source-codes
          glob: '**'
          gzip: false

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: [pylint, upload-spark]
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      - name: Terraform Validate
        run: terraform validate
      - name: Terraform Plan
        run: terraform plan
      - name: Terraform Apply
        run: terraform apply -auto-approve
